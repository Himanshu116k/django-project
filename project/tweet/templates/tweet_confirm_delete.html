{% extends "layout.html" %}

{% block title %}
Tweet
{% endblock %}

{% block content %}
<h1 class='text-center text-white mt-4'>Welcome to my project</h1>

<h2>Are you sure you want to delete this tweet?</h2>
<form method='post'>
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Delete</button>
    <a class="btn btn-primary"href="{% url 'tweet_list'%}">Cancel</a>
</form>

{% endblock %}
